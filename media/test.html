<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YTP Visualizer Test Harness</title>
    <link href="main.css" rel="stylesheet">
    <link href="webview.css" rel="stylesheet">
    <style>
        /* Simulate VS Code Theme Variables */
        :root {
            --vscode-editor-background: #1e1e1e;
            --vscode-editor-foreground: #d4d4d4;
            --vscode-sideBar-background: #252526;
            --vscode-sideBar-foreground: #cccccc;
            --vscode-sideBarTitle-foreground: #bbbbbb;
            --vscode-button-secondaryBackground: #3a3d41;
            --vscode-button-secondaryForeground: #ffffff;
            --vscode-button-secondaryHoverBackground: #45494e;
            --vscode-input-background: #3c3c3c;
            --vscode-input-foreground: #cccccc;
            --vscode-input-border: #3c3c3c;
            --vscode-focusBorder: #007fd4;
            --vscode-foreground: #cccccc;
            --vscode-editorWidget-background: #252526;
            --vscode-editorWidget-border: #454545;
        }
        body.vscode-light {
            --vscode-editor-background: #ffffff;
            --vscode-editor-foreground: #000000;
            /* Add light mode variables if needed */
        }
    </style>
    <style>
        /* Test harness specific styles */
        #test-controls {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 10000;
            background: #2d2d2d;
            border: 1px solid #555;
            border-radius: 8px;
            padding: 15px;
            width: 300px;
            max-height: 90vh;
            overflow-y: auto;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 13px;
            color: #ccc;
        }
        #test-controls h2 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #fff;
            border-bottom: 1px solid #555;
            padding-bottom: 8px;
        }
        #test-controls h3 {
            margin: 15px 0 8px 0;
            font-size: 13px;
            color: #9cdcfe;
        }
        #test-controls select, #test-controls button, #test-controls textarea {
            width: 100%;
            margin-bottom: 8px;
            padding: 8px;
            background: #3c3c3c;
            color: #ccc;
            border: 1px solid #555;
            border-radius: 4px;
            font-size: 12px;
        }
        #test-controls button {
            cursor: pointer;
            background: #0e639c;
            color: #fff;
            border: none;
        }
        #test-controls button:hover {
            background: #1177bb;
        }
        #test-controls button.secondary {
            background: #555;
        }
        #test-controls button.secondary:hover {
            background: #666;
        }
        #test-controls textarea {
            min-height: 150px;
            font-family: Consolas, monospace;
            resize: vertical;
        }
        #test-controls .status {
            padding: 8px;
            background: #1e1e1e;
            border-radius: 4px;
            margin-top: 10px;
            font-size: 11px;
            color: #888;
        }
        #test-controls .status.success { color: #4ec9b0; }
        #test-controls .status.error { color: #f14c4c; }
        #minimize-btn {
            position: absolute;
            top: 5px;
            right: 10px;
            background: none;
            border: none;
            color: #888;
            font-size: 18px;
            cursor: pointer;
            padding: 0;
            width: auto;
        }
        #minimize-btn:hover { color: #fff; }
        #test-controls.minimized {
            width: auto;
            padding: 5px 10px;
        }
        #test-controls.minimized > *:not(#minimize-btn):not(h2) { display: none; }
        #test-controls.minimized h2 { margin: 0; padding: 0; border: none; font-size: 12px; }
    </style>
</head>
<body class="vscode-dark">
    <div id="app">
        <button id="sidebar-toggle" title="Toggle Sidebar">☰</button>

        <div id="sidebar">
            <div id="sidebar-header">
                <span style="padding: 10px; color: #888; font-size: 12px;">Test Mode</span>
            </div>
            <div id="variable-list">
                <div class="empty-state">Load test data to begin...</div>
            </div>
        </div>

        <div id="splitter"></div>

        <div id="dashboard">
            <div class="empty-state-canvas">
                Load test data and check a variable to visualize it.
            </div>
        </div>
    </div>

    <!-- Test Controls Panel -->
    <div id="test-controls">
        <button id="minimize-btn">−</button>
        <h2>🧪 Test Harness</h2>
        
        <h3>Quick Load</h3>
        <select id="preset-select">
            <option value="">Select test data...</option>
            <option value="array-matrix">Array & Matrix</option>
            <option value="linked-list">Linked List</option>
            <option value="graph">Graph (Adj Matrix)</option>
            <option value="weighted-adj-list">Weighted Adj List</option>
            <option value="edge-list">Edge List</option>
            <option value="heap">Heap</option>
            <option value="json-text">JSON & Text</option>
        </select>
        
        <h3>Load .YTP File</h3>
        <input type="file" id="ytp-file-input" accept=".txt,.json" multiple>
        <button id="load-file-btn">Load Selected File(s)</button>

        <h3>Custom JSON</h3>
        <textarea id="json-input" placeholder='Paste JSON here...
{
  "frameId": 1,
  "scopes": [{
    "name": "Locals",
    "variables": [...]
  }]
}'></textarea>
        <button id="load-json-btn">Load Custom JSON</button>
        
        <h3>Actions</h3>
        <button id="clear-btn" class="secondary">Clear All Blocks</button>
        <button id="reload-btn" class="secondary">Reload Page</button>
        
        <div id="status" class="status">Ready</div>
    </div>

    <!-- Mock VS Code API for standalone testing -->
    <script>
        // Mock vscode API
        window.acquireVsCodeApi = function() {
            let state = { splitPaneWidth: 200, blocks: [] };
            return {
                getState: () => state,
                setState: (s) => { state = s; },
                postMessage: (msg) => { console.log('[Mock postMessage]', msg); }
            };
        };
    </script>

    <!-- Load all visualizer scripts -->
    <script src="utils/CustomDropdown.js"></script>
    <script src="utils/ResizeHandle.js"></script>
    <script src="core/Registry.js"></script>
    <script src="visualizers/BaseVisualizer.js"></script>
    <script src="visualizers/GraphBaseVisualizer.js"></script>
    <script src="visualizers/TextVisualizer.js"></script>
    <script src="visualizers/JsonVisualizer.js"></script>
    <script src="visualizers/ArrayVisualizer.js"></script>
    <script src="visualizers/MatrixVisualizer.js"></script>
    <script src="visualizers/LinkedListVisualizer.js"></script>
    <script src="visualizers/GraphVisualizer.js"></script>
    <script src="visualizers/HeapVisualizer.js"></script>
    <script src="lib/d3-force.min.js"></script>
    <!-- Modifier system -->
    <script src="modifiers/BaseModifier.js"></script>
    <script src="modifiers/ModifierRegistry.js"></script>
    <script src="modifiers/PointerModifier.js"></script>
    <script src="modifiers/ColorModifier.js"></script>
    <script src="modifiers/LabelModifier.js"></script>
    <script src="modifiers/RangeModifier.js"></script>
    <script src="core/Manager.js"></script>
    <script src="main.js"></script>

    <!-- Test harness script -->
    <script src="test-harness.js"></script>
</body>
</html>
