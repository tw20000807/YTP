<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src {{cspSource}} 'unsafe-inline'; script-src {{cspSource}} 'unsafe-inline';">
    <link href="{{styleUri}}" rel="stylesheet">
    <title>YTP Debugger</title>
</head>
<body>
    <div id="app">
        <!-- Sidebar: Variable List -->
        
        <div id="sidebar">
            <div id="sidebar-header">
                <span>Variables</span>
            </div>
            <div id="variable-list">
                <div class="empty-state">Waiting for debugger...</div>
                <!-- This content is generated dynamically by main.js -->
                <!-- Example structure (for reference):
                <div style="font-weight: bold; padding: 5px 10px; background-color: #252526;">Locals</div>
                <ul style="list-style: none; padding-left: 20px;">
                    <li>
                        <div class="var-header">
                            <input type="checkbox" class="var-checkbox" data-path="myVector">
                            <span class="var-name">myVector</span>
                            <span class="var-value">{size=5}</span>
                            <span class="var-type">std::vector&lt;int&gt;</span>
                        </div>
                    </li>
                    <li>
                        <div class="var-header">
                            <input type="checkbox" class="var-checkbox" data-path="count">
                            <span class="var-name">count</span>
                            <span class="var-value">42</span>
                            <span class="var-type">int</span>
                        </div>
                    </li>
                </ul>
                -->
            </div>
        </div>

        <!-- Splitter: Resizable handle -->
        <div id="splitter"></div>

        <!-- Dashboard: Visualizer Blocks -->
        <div id="dashboard">
            <div class="empty-state-canvas">
                Check a variable to visualize it.
            </div>
        </div>
    </div>
    <script src="{{scriptUri}}"></script>
</body>
</html>
